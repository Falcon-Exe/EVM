<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Ballot Access - EVM</title>
    <link rel="stylesheet" href="evm-hardware.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="evm-frame" style="max-width: 500px; text-align: center;">
        <h1 style="font-family:'Orbitron'; color: #1e3a8a; margin-bottom: 30px; line-height: 1.2;">ELECTRONIC VOTING
            MACHINE<br><span style="font-size: 0.8em; opacity: 0.7;">REMOTE ACCESS</span></h1>

        <div id="error-box"
            style="background: #fee2e2; border: 2px solid #ef4444; color: #b91c1c; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-weight: bold;"
            class="hidden"></div>

        <div class="evm-inner-bezel" style="background: white; padding: 40px; margin-bottom: 20px;">
            <p style="font-weight: bold; color: #475569; margin-bottom: 15px;">ENTER CIC/REG NO & SECURE PIN</p>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <input type="text" id="studentId" placeholder="ID NUMBER"
                    style="width: 100%; padding: 12px; font-family:'Orbitron'; text-align:center; font-size: 1.2rem; border: 3px solid #94a3b8; border-radius: 8px;">
            </div>

            <div class="form-group">
                <input type="password" id="pin" placeholder="SECURE PIN"
                    style="width: 100%; padding: 12px; font-family:'Orbitron'; text-align:center; font-size: 1.2rem; border: 3px solid #94a3b8; border-radius: 8px;">
            </div>

            <div style="margin-top: 25px;">
                <button class="evm-blue-btn" onclick="remoteLogin()"
                    style="width: 100%; height: 60px; color: white; font-size: 1.3rem;">AUTHENTICATE</button>
            </div>
        </div>

        <p style="font-size: 0.8rem; color: #64748b; font-weight: bold;">SECURE REMOTE VOTING PORTAL</p>
        <a href="index.html" style="font-size: 0.7rem; color: #3b82f6; text-decoration: none; margin-top: 10px; display: block;">Standard Booth Login</a>
    </div>

    <script>
        async function remoteLogin() {
            const studentId = document.getElementById('studentId').value;
            const pin = document.getElementById('pin').value;
            const errorBox = document.getElementById('error-box');

            if (!studentId || !pin) {
                errorBox.textContent = "ID and PIN required";
                errorBox.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/remote-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId, pin })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('studentName', data.name);
                    window.location.href = 'vote.html';
                } else {
                    errorBox.textContent = data.error;
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.textContent = "Network error. Try again.";
                errorBox.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
